name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [ "published" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary-name: bettercurl
          - os: macos-latest
            target: x86_64-apple-darwin
            binary-name: bettercurl
          - os: macos-latest
            target: aarch64-apple-darwin
            binary-name: bettercurl
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary-name: bettercurl.exe

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      run: |
        rustup toolchain install stable --profile minimal
        rustup target add ${{ matrix.target }}
      shell: bash

    - name: Build (release)
      run: cargo build --release --target ${{ matrix.target }}
      shell: bash

    - name: Strip binary (Linux/macOS only)
      if: contains(matrix.os, 'ubuntu') || contains(matrix.os, 'macos')
      run: |
        if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
          strip target/${{ matrix.target }}/release/${{ matrix.binary-name }}
        else
          # macOS stripping
          strip target/${{ matrix.target }}/release/${{ matrix.binary-name }} || true
        fi
      shell: bash

    - name: Create archive
      run: |
        BINARY_NAME="${{ matrix.binary-name }}"
        TARGET="${{ matrix.target }}"
        ARCHIVE_NAME="bettercurl-${{ matrix.os }}-${{ matrix.target }}"
        mkdir -p "$ARCHIVE_NAME"
        cp "target/$TARGET/release/$BINARY_NAME" "$ARCHIVE_NAME/"
        if [ "${{ matrix.os }}" != "windows-latest" ]; then
          tar -czf "$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME"
        else
          tar -czf "$ARCHIVE_NAME.tar.gz" --force-local "$ARCHIVE_NAME"
        fi
      shell: bash

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: bettercurl-${{ matrix.target }}
        path: |
          bettercurl-*-x86_64-unknown-linux-gnu.tar.gz
          bettercurl-*-x86_64-apple-darwin.tar.gz
          bettercurl-*-aarch64-apple-darwin.tar.gz
          bettercurl-*-x86_64-pc-windows-msvc.tar.gz
        retention-days: 7

  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      run: |
        rustup toolchain install stable
        rustup override set stable

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose

    - name: Run clippy
      run: cargo clippy -- -D warnings

    - name: Check formatting
      run: cargo fmt --all -- --check

  release:
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release assets
      run: |
        mkdir -p release-assets
        for dir in artifacts/*/; do
          echo "Processing $dir..."
          cp "$dir"*.tar.gz release-assets/ || true
        done
        ls -lah release-assets/
      shell: bash

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: release-assets/*.tar.gz
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
